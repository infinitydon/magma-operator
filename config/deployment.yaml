apiVersion: v1
kind: Namespace
metadata:
  name: magma-operator-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: magma-operator
  namespace: magma-operator-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: magma-operator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: magma-operator
    spec:
      serviceAccountName: magma-operator
      containers:
        - name: operator
          image: ghcr.io/infinitydon/magma-operator:0.1.0
          imagePullPolicy: IfNotPresent
          env:
            - name: MAGMA_OPERATOR_WORKDIR
              value: /tmp/magma-operator
