apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: magmaorc8rs.magma.infra.don
spec:
  group: magma.infra.don
  scope: Namespaced
  names:
    plural: magmaorc8rs
    singular: magmaorc8r
    kind: MagmaOrc8r
    shortNames:
      - morc8r
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          required:
            - spec
          properties:
            spec:
              type: object
              required:
                - chart
              properties:
                chart:
                  type: object
                  required:
                    - repo
                    - path
                  properties:
                    repo:
                      type: string
                    path:
                      type: string
                    version:
                      type: string
                      default: main
                    releaseName:
                      type: string
                      default: magma-fullstack
                    values:
                      type: object
                      x-kubernetes-preserve-unknown-fields: true
                domainName:
                  type: string
                  default: magma.local
                nms:
                  type: object
                  properties:
                    serviceType:
                      type: string
                      enum: [ClusterIP, NodePort, LoadBalancer]
                      default: NodePort
                    admin:
                      type: object
                      properties:
                        organization:
                          type: string
                          default: magma-test
                        username:
                          type: string
                          default: admin
                        passwordSecretRef:
                          type: object
                          properties:
                            name:
                              type: string
                            key:
                              type: string
                              default: password
                waitTimeoutSeconds:
                  type: integer
                  minimum: 60
                  default: 3600
            status:
              type: object
              x-kubernetes-preserve-unknown-fields: true
      additionalPrinterColumns:
        - name: Ready
          type: string
          jsonPath: .status.ready
        - name: Release
          type: string
          jsonPath: .status.releaseName
        - name: NMS
          type: string
          jsonPath: .status.nmsUrl
