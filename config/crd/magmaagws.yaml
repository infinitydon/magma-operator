apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: magmaagws.magma.infra.don
spec:
  group: magma.infra.don
  scope: Namespaced
  names:
    plural: magmaagws
    singular: magmaagw
    kind: MagmaAGW
    shortNames:
      - magw
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          required:
            - spec
          properties:
            spec:
              type: object
              required:
                - chart
              properties:
                chart:
                  type: object
                  required:
                    - repo
                    - path
                  properties:
                    repo:
                      type: string
                    path:
                      type: string
                    version:
                      type: string
                      default: main
                    releaseName:
                      type: string
                      default: agwc
                    values:
                      type: object
                      x-kubernetes-preserve-unknown-fields: true
                orc8rRef:
                  type: object
                  properties:
                    name:
                      type: string
                    namespace:
                      type: string
                agwNodeSelector:
                  type: object
                  additionalProperties:
                    type: string
                requireDedicatedNode:
                  type: boolean
                  default: true
                ueSimulator:
                  type: object
                  properties:
                    enabled:
                      type: boolean
                      default: false
                    nodeSelector:
                      type: object
                      additionalProperties:
                        type: string
                waitTimeoutSeconds:
                  type: integer
                  minimum: 60
                  default: 1800
            status:
              type: object
              x-kubernetes-preserve-unknown-fields: true
      additionalPrinterColumns:
        - name: Ready
          type: string
          jsonPath: .status.ready
        - name: Release
          type: string
          jsonPath: .status.releaseName
        - name: Orc8r
          type: string
          jsonPath: .status.orc8rRef
