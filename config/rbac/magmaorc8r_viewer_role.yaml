# This rule is not used by the project magma-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to magma.infra.don resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: magma-operator
    app.kubernetes.io/managed-by: kustomize
  name: magmaorc8r-viewer-role
rules:
- apiGroups:
  - magma.infra.don
  resources:
  - magmaorc8rs
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - magma.infra.don
  resources:
  - magmaorc8rs/status
  verbs:
  - get
