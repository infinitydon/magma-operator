---
namespace: magma-agw

# Define which secrets should be mounted by pods.
secret:
  certs: agwc-secret-certs
  create: true

image:
  repository: ghcr.io/infinitydon/telco-helm-charts
  pullPolicy: IfNotPresent
  tag: "1.9.0-upstream"
  # Arch is blank for x86 and _arm for ARM64
  arch:
  gatewayGoRepository: ghcr.io/infinitydon/telco-helm-charts
  gatewayGoTag: "1.9.0-upstream"
  test: alpine:3.20.3

config:
  domainName: magma.local
  cloudPort: 8443
  bootstrapPort: 8444
  fluentdHost: fluentd.magma.svc.cluster.local
  fluentdPort: 24224
  gwChallenge: ""
  amf:
    # Magma 1.9's mme.conf template hardcodes 5G T3512 to 10 minutes. UERANSIM
    # performs periodic registration at that timer and can lose its PDU session
    # if the update path is not completed. Use the upstream LTE/default timer
    # length for stable 5G simulator validation.
    t3512Minutes: 54

gatewayIdentity:
  snowflake: ""

gatewayConfig:
  mountFiles:
    - key: magmad.yml
      path: magmad.yml
    - key: service_registry.yml
      path: service_registry.yml
    - key: gateway.mconfig
      path: gateway.mconfig
    - key: connectiond.yml
      path: connectiond.yml
    - key: dnsd.yml
      path: dnsd.yml
    - key: enodebd.yml
      path: enodebd.yml
    - key: health.yml
      path: health.yml
    - key: liagentd.yml
      path: liagentd.yml
    - key: mme.yml
      path: mme.yml
    - key: monitord.yml
      path: monitord.yml
    - key: pipelined.yml
      path: pipelined.yml_prod
    - key: redis.yml
      path: redis.yml
    - key: redirectd.yml
      path: redirectd.yml
    - key: spgw.yml
      path: spgw.yml
    - key: subscriberdb.yml
      path: subscriberdb.yml

orc8r:
  hostAliases:
    enabled: true
    # Set this to the ClusterIP or routable address of the Orc8r nginx proxy
    # that serves controller, bootstrapper, and service controller hostnames.
    ip: "10.152.183.140"
    hostnames:
      - controller.magma.local
      - bootstrapper-controller.magma.local
      - accessd-controller.magma.local
      - certifier-controller.magma.local
      - configurator-controller.magma.local
      - device-controller.magma.local
      - directoryd-controller.magma.local
      - dispatcher-controller.magma.local
      - eventd-controller.magma.local
      - metricsd-controller.magma.local
      - policydb-controller.magma.local
      - state-controller.magma.local
      - streamer-controller.magma.local
      - subscriberdb-controller.magma.local

nodeSelector:
  magma.io/agw-node: "true"
  kubernetes.io/hostname: ebpf-bng-node-03-ubuntu-focal
tolerations: []

agwAntiAffinity:
  enabled: true
  topologyKey: kubernetes.io/hostname

persistent:
  name: agwc-claim

services:
  liagentd:
    enabled: false

startup:
  pipelined:
    waitForSessiond:
      enabled: true
      host: 127.0.0.1
      port: 50065
      timeoutSeconds: 180
    qfiClassifierFallback:
      enabled: true
      intervalSeconds: 5
      bridge: gtp_br0
      qfiPriority: 65503
      fallbackPriority: 65502
      gtpPort: 32768
      upfAssociation:
        enabled: true
        sessiondTarget: 127.0.0.1:50065
        nodeId: 192.168.60.142
        n3Address: 192.168.60.142
      sessionPass:
        enabled: true
        priority: 100

nodePrep:
  enabled: true
  image: ubuntu:22.04
  installOpenvSwitch: true
  installKernelModulesExtra: true
  nodeSelector: {}
  requireMagmaOvsKmod: false
  runMagmaOvsKmodUpgrade: true
  magmaOvsKmodUpgradePath: /usr/local/bin/ovs-kmod-upgrade.sh
  ovsKmod:
    validateGtpu: true
    installCommand: ""
    packageUrl: ""
    packageSha256: ""
    packagePath: /tmp/magma-ovs-kmod.deb
    probePort: magma-gtpu-probe
  sleepAfterPrep: true
  bridge:
    name: gtp_br0
    address: 192.168.128.1/24
    protocols: OpenFlow10,OpenFlow13,OpenFlow14
    datapathType: system
  gtpu:
    enabled: true
    name: gtpu0
    ofport: 32768
    type: gtpu
    disableOffloads: true
    cleanupPorts:
      - gtpu_sys_2152
  tcpMssClamp:
    enabled: true
    mss: 1400
  uplinkBridge:
    enabled: true
    name: uplink_br0
    patchToGtp:
      name: patch-up
      peer: patch-agw
      ofport: 2
    patchToUplink:
      name: patch-agw
      peer: patch-up
    uplinkPort: magma-sgi
  natEgress:
    enabled: true
    # Empty means detect the node default-route interface. Set to a dedicated
    # SGi/uplink interface when one exists.
    interface: ""
    sourceCidr: 192.168.128.0/24
  interfaces:
    createMissing: true
    cleanupLegacy:
      - eth1
      - eth2
    s1:
      name: magma-n2
      type: macvlan
      parent: enp8s19
      mode: bridge
      address: 10.88.99.142/24
      replaceAddresses: true
    n3:
      name: magma-n3
      type: macvlan
      parent: enp8s20
      mode: bridge
      address: 192.168.60.142/24
      replaceAddresses: true
    nat:
      name: magma-sgi
      type: macvlan
      parent: enp8s21
      mode: bridge
      address: ""
      replaceAddresses: true
    internal:
      - name: mtr0
        type: internal
        bridge: gtp_br0
        ofport: 15577
        address: 192.168.128.2/32
      - name: ipfix0
        type: internal
        bridge: gtp_br0
      - name: li_port
        type: internal
        bridge: gtp_br0
  sysctl:
    net.ipv4.ip_forward: "1"

simulator:
  enabled: false
  nodeSelector:
    magma.io/ueransim-node: "true"
    kubernetes.io/hostname: ebpf-bng-node-01
  antiAffinity:
    separateFromAgw: true
    topologyKey: kubernetes.io/hostname
  image:
    repository: ghcr.io/infinitydon/ueransim
    tag: "v3.2.4-x86-64"
    pullPolicy: Always
  initImage:
    repository: alpine
    tag: "3.21.7"
    pullPolicy: IfNotPresent
  multus:
    enabled: true
    type: macvlan
    mode: bridge
    n2:
      name: magma-ueransim-n2
      master: enp8s19
      interface: n2
      ip: 10.88.99.150/24
      gateway: ""
    n3:
      name: magma-ueransim-n3
      master: enp8s20
      interface: n3
      ip: 192.168.60.150/24
      gateway: ""
  gnb:
    commandPath: /opt/UERANSIM/build/nr-gnb
    name: magma-ueransim-gnb
    startDelaySeconds: 30
    nci: "0x000000010"
    idLength: 32
    tac: "000001"
    amfAddress: 10.88.99.142
    slices:
      sst: 1
      sd: ""
  ue:
    commandPath: /opt/UERANSIM/build/nr-ue
    supi: "imsi-001010000000001"
    mcc: "001"
    mnc: "01"
    key: "465B5CE8B199B49FAA5F0A2EE238A6BC"
    opc: "E8ED289DEBA952E4283B54E88E6183CA"
    amf: "8000"
    imei: "356938035643803"
    imeiSv: "4370816125816151"
    apn: magma.ipv4
    startDelaySeconds: 60
  subscriber:
    provision: false
    nextSeq: "000000000000"
    apnConfig: "magma.ipv4,9,1,0,0,300000000,300000000,0,,,,"
  iperf3Server:
    enabled: false
    hostNetwork: false
    port: 5201
    nodeSelector: {}
    multus:
      enabled: false
      networkName: iperf-macvlan
      interface: net1
      master: eth0
      mode: bridge
      ip: ""
    resources: {}

resources: {}
