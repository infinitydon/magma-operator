{{- if and .Values.simulator.enabled .Values.simulator.iperf3Server.enabled }}
{{ include "magma-agw-upstream.assertNoLatest" . }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-ueransim-iperf3
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/component: ueransim-iperf3
{{ include "default-labels" . | indent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: ueransim-iperf3
{{ include "default-selector-labels" . | indent 6 }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: ueransim-iperf3
{{ include "default-selector-labels" . | indent 8 }}
      annotations:
        checksum/simulator-values: {{ toJson .Values.simulator | sha256sum }}
      {{- if and .Values.simulator.iperf3Server.multus.enabled .Values.simulator.iperf3Server.multus.ip }}
        k8s.v1.cni.cncf.io/networks: |
          [
            {"name": "{{ .Values.simulator.iperf3Server.multus.networkName }}", "namespace": "{{ .Values.namespace }}", "interface": "{{ .Values.simulator.iperf3Server.multus.interface }}", "ips": ["{{ .Values.simulator.iperf3Server.multus.ip }}"]}
          ]
      {{- end }}
    spec:
      {{- include "simulator.agwAntiAffinity" . | nindent 6 }}
      {{- if .Values.simulator.iperf3Server.hostNetwork }}
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      {{- end }}
      {{- with (default .Values.simulator.nodeSelector .Values.simulator.iperf3Server.nodeSelector) }}
      nodeSelector:
{{ toYaml . | indent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
{{ toYaml . | indent 8 }}
      {{- end }}
      containers:
        - name: iperf3
          image: {{ printf "%s:%s" .Values.simulator.image.repository .Values.simulator.image.tag | quote }}
          imagePullPolicy: {{ .Values.simulator.image.pullPolicy }}
          command:
            - /bin/bash
            - -ceu
            - |
              exec iperf3 -s -p {{ .Values.simulator.iperf3Server.port | int }}
          ports:
            - name: iperf3
              containerPort: {{ .Values.simulator.iperf3Server.port | int }}
              protocol: TCP
          resources:
{{ toYaml .Values.simulator.resources | indent 12 }}
{{- end }}
