---
apiVersion: v1
kind: ConfigMap
metadata:
  labels:
    app.kubernetes.io/component: control-proxy
  name: controlproxy-config
  namespace: {{ .Values.namespace }}
data:
  gw_challenge.b64: |
    {{ print .Values.config.gwChallenge | trim | nospace }}
  control_proxy.yml: |
    nghttpx_config_location: /var/opt/magma/tmp/nghttpx.conf

    rootca_cert: /var/opt/magma/certs/rootCA.pem
    gateway_cert: /var/opt/magma/certs/gateway.crt
    gateway_key: /var/opt/magma/certs/gateway.key

    local_port: 8443

    # Cloud address for reaching out to the cloud.
    cloud_address: controller.{{ .Values.config.domainName }}
    cloud_port: {{ .Values.config.cloudPort }}

    bootstrap_address: bootstrapper-controller.{{ .Values.config.domainName }}
    bootstrap_port: {{ .Values.config.bootstrapPort }}

    fluentd_address: {{ .Values.config.fluentdHost }}
    fluentd_port: {{ .Values.config.fluentdPort }}

    proxy_cloud_connections: True
    allow_http_proxy: False

    sentry_url_python: ""
    sentry_url_native: ""
    sentry_upload_mme_log: false
    sentry_sample_rate: 1.0
