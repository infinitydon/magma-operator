{{- if and .Values.simulator.enabled .Values.simulator.iperf3Server.enabled .Values.simulator.iperf3Server.multus.enabled }}
---
apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: {{ .Values.simulator.iperf3Server.multus.networkName }}
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/component: ueransim-iperf3
{{ include "default-labels" . | indent 4 }}
spec:
  config: |-
    {
      "cniVersion": "0.3.1",
      "type": "macvlan",
      "master": "{{ .Values.simulator.iperf3Server.multus.master }}",
      "mode": "{{ .Values.simulator.iperf3Server.multus.mode }}",
      "ipam": {
        "type": "static"
      }
    }
{{- end }}
