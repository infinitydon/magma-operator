apiVersion: v1
kind: ConfigMap
metadata:
  name: magmad-systemctl-shim
  namespace: {{ .Values.namespace }}
  labels:
{{ include "default-labels" . | indent 4 }}
data:
  systemctl: |
    #!/bin/sh
    set -eu

    command="${1:-}"

    case "$command" in
      is-active)
        echo active
        exit 0
        ;;
      show)
        echo MainPID=0
        echo MemoryCurrent=0
        echo MemoryAccounting=no
        echo MemoryLimit=infinity
        exit 0
        ;;
      start|stop|reload-or-restart|restart)
        exit 0
        ;;
      *)
        echo "unsupported systemctl shim command: $*" >&2
        exit 1
        ;;
    esac
