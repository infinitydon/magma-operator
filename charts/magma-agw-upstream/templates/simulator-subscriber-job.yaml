{{- if and .Values.simulator.enabled .Values.simulator.subscriber.provision }}
{{ include "magma-agw-upstream.assertNoLatest" . }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-subscriber-provision-{{ .Release.Revision }}
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/component: ueransim-subscriber-provision
{{ include "default-labels" . | indent 4 }}
spec:
  backoffLimit: 6
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app.kubernetes.io/component: ueransim-subscriber-provision
{{ include "default-selector-labels" . | indent 8 }}
    spec:
      restartPolicy: OnFailure
      hostNetwork: true
      {{- with .Values.nodeSelector }}
      nodeSelector:
{{ toYaml . | indent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
{{ toYaml . | indent 8 }}
      {{- end }}
      containers:
        - name: provision
          image: "{{ .Values.image.repository }}/agw_gateway_python{{ .Values.image.arch}}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /bin/sh
            - -ceu
            - |
              supi={{ .Values.simulator.ue.supi | quote }}
              imsi="${supi#imsi-}"
              sid="IMSI${imsi}"
              key={{ .Values.simulator.ue.key | quote }}
              opc={{ .Values.simulator.ue.opc | quote }}
              next_seq={{ .Values.simulator.subscriber.nextSeq | quote }}
              apn_config={{ .Values.simulator.subscriber.apnConfig | quote }}

              for i in $(seq 1 60); do
                if /usr/local/bin/subscriber_cli.py list >/dev/null 2>&1; then
                  break
                fi
                echo "waiting for subscriberdb (${i}/60)"
                sleep 2
              done

              if /usr/local/bin/subscriber_cli.py get "${sid}" >/dev/null 2>&1; then
                echo "subscriber ${sid} already exists"
              else
                echo "adding subscriber ${sid}"
                /usr/local/bin/subscriber_cli.py add "${sid}" \
                  --lte-auth-key "${key}" \
                  --lte-auth-opc "${opc}" \
                  --lte-auth-next-seq "${next_seq}"
              fi

              echo "updating subscriber ${sid} APN/DNN profile"
              /usr/local/bin/subscriber_cli.py update "${sid}" --apn-config "${apn_config}"
{{- end }}
