{{- if .Values.simulator.enabled }}
{{ include "magma-agw-upstream.assertNoLatest" . }}
---
apiVersion: v1
kind: Pod
metadata:
  name: {{ .Release.Name }}-ueransim-smoke
  namespace: {{ .Values.namespace }}
  annotations:
    "helm.sh/hook": test
  labels:
    app.kubernetes.io/component: ueransim-smoke
{{ include "default-labels" . | indent 4 }}
spec:
  restartPolicy: Never
  containers:
    - name: smoke
      image: {{ .Values.image.test | quote }}
      command:
        - /bin/sh
        - -ceu
        - |
          echo "UERANSIM resources are managed by deployments:"
          echo "{{ .Release.Name }}-ueransim-gnb"
          echo "{{ .Release.Name }}-ueransim-ue"
{{- end }}
