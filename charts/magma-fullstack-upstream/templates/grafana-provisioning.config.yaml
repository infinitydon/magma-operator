{{- if .Values.orc8r.metrics.userGrafana.create }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: magma-grafana-datasources
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: magma-grafana-datasources
    app.kubernetes.io/part-of: magma-fullstack-upstream
data:
  prometheus.yaml: |
    apiVersion: 1
    datasources:
      - name: Magma Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
        editable: false
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: magma-grafana-dashboardproviders
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: magma-grafana-dashboardproviders
    app.kubernetes.io/part-of: magma-fullstack-upstream
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: magma
        orgId: 1
        folder: Magma
        type: file
        disableDeletion: false
        editable: false
        options:
          path: /var/lib/grafana/dashboards
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: magma-grafana-dashboards
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: magma-grafana-dashboards
    app.kubernetes.io/part-of: magma-fullstack-upstream
data:
