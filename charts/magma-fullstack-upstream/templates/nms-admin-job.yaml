{{- if .Values.nmsAdmin.enabled }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-nms-admin
  labels:
    app.kubernetes.io/component: nms-admin
{{ include "magma-fullstack-upstream.labels" . | indent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "10"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: 12
  template:
    metadata:
      labels:
        app.kubernetes.io/component: nms-admin
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: register-admin-operator
          image: {{ printf "%s:%s" .Values.orc8r.controller.image.repository .Values.orc8r.controller.image.tag | quote }}
          imagePullPolicy: {{ .Values.orc8r.controller.image.pullPolicy }}
          command:
            - /bin/sh
            - -ceu
            - |
              attempts=0
              while [ "$attempts" -lt 60 ]; do
                attempts=$((attempts + 1))
                set +e
                output="$(envdir /var/opt/magma/envdir /var/opt/magma/bin/accessc add-existing -admin -cert /var/opt/magma/certs/admin_operator.pem admin_operator 2>&1)"
                rc="$?"
                set -e
                printf '%s\n' "$output"
                if [ "$rc" -eq 0 ]; then
                  exit 0
                fi
                case "$output" in
                  *AlreadyExists*) exit 0 ;;
                esac
                sleep 5
              done
              exit 1
          volumeMounts:
            - name: orc8r-secrets-certs
              mountPath: /var/opt/magma/certs
              readOnly: true
            - name: orc8r-secrets-envdir
              mountPath: /var/opt/magma/envdir
              readOnly: true
      containers:
        - name: nms-admin
          image: {{ printf "%s:%s" .Values.orc8r.nms.magmalte.image.repository .Values.orc8r.nms.magmalte.image.tag | quote }}
          imagePullPolicy: {{ .Values.orc8r.nms.magmalte.image.pullPolicy }}
          command:
            - /bin/sh
            - -ceu
            - |
              until nc -z postgresql 5432; do sleep 5; done
              yarn setAdminPassword {{ .Values.nmsAdmin.organization | quote }} {{ .Values.nmsAdmin.email | quote }} {{ .Values.nmsAdmin.password | quote }}
          env:
            - name: MYSQL_DB
              value: {{ .Values.postgresql.database | quote }}
            - name: MYSQL_HOST
              value: {{ .Values.postgresql.name | quote }}
            - name: MYSQL_PORT
              value: "5432"
            - name: MYSQL_DIALECT
              value: postgres
            - name: MYSQL_USER
              value: {{ .Values.postgresql.username | quote }}
            - name: MYSQL_PASS
              value: {{ .Values.postgresql.password | quote }}
            - name: API_HOST
              value: {{ .Values.orc8r.nms.magmalte.env.api_host | quote }}
            - name: API_CERT_FILENAME
              value: /run/secrets/admin_operator.pem
            - name: API_PRIVATE_KEY_FILENAME
              value: /run/secrets/admin_operator.key.pem
          volumeMounts:
            - name: orc8r-secrets-certs
              mountPath: /run/secrets/admin_operator.pem
              subPath: admin_operator.pem
              readOnly: true
            - name: orc8r-secrets-certs
              mountPath: /run/secrets/admin_operator.key.pem
              subPath: admin_operator.key.pem
              readOnly: true
      volumes:
        - name: orc8r-secrets-certs
          secret:
            secretName: {{ .Values.secrets.certsName }}
            defaultMode: 0444
        - name: orc8r-secrets-envdir
          secret:
            secretName: {{ .Values.secrets.envdirName }}
            defaultMode: 0444
{{- end }}
