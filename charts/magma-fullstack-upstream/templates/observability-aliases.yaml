{{- if .Values.observability.aliases.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: magma-fullstack-upstream
spec:
  type: ExternalName
  externalName: {{ .Release.Name }}-prometheus.{{ .Release.Namespace }}.svc.cluster.local
  ports:
    - name: prometheus
      port: 9090
      targetPort: 9090
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus-configurer
  labels:
    app.kubernetes.io/name: prometheus-configurer
    app.kubernetes.io/part-of: magma-fullstack-upstream
spec:
  type: ExternalName
  externalName: {{ .Release.Name }}-prometheus-configurer.{{ .Release.Namespace }}.svc.cluster.local
  ports:
    - name: prometheus-configurer
      port: 9100
      targetPort: 9100
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus-cache
  labels:
    app.kubernetes.io/name: prometheus-cache
    app.kubernetes.io/part-of: magma-fullstack-upstream
spec:
  type: ExternalName
  externalName: {{ .Release.Name }}-prometheus-cache.{{ .Release.Namespace }}.svc.cluster.local
  ports:
    - name: prometheus-cache
      port: 9091
      targetPort: 9091
    - name: prometheus-cache-grpc
      port: 9092
      targetPort: 9092
---
apiVersion: v1
kind: Service
metadata:
  name: orc8r-prometheus-cache
  labels:
    app.kubernetes.io/name: orc8r-prometheus-cache
    app.kubernetes.io/part-of: magma-fullstack-upstream
spec:
  type: ExternalName
  externalName: {{ .Release.Name }}-prometheus-cache.{{ .Release.Namespace }}.svc.cluster.local
  ports:
    - name: prometheus-cache
      port: 9091
      targetPort: 9091
    - name: prometheus-cache-grpc
      port: 9092
      targetPort: 9092
---
apiVersion: v1
kind: Service
metadata:
  name: alertmanager
  labels:
    app.kubernetes.io/name: alertmanager
    app.kubernetes.io/part-of: magma-fullstack-upstream
spec:
  type: ExternalName
  externalName: {{ .Release.Name }}-alertmanager.{{ .Release.Namespace }}.svc.cluster.local
  ports:
    - name: alertmanager
      port: 9093
      targetPort: 9093
---
apiVersion: v1
kind: Service
metadata:
  name: orc8r-alertmanager
  labels:
    app.kubernetes.io/name: orc8r-alertmanager
    app.kubernetes.io/part-of: magma-fullstack-upstream
spec:
  type: ExternalName
  externalName: {{ .Release.Name }}-alertmanager.{{ .Release.Namespace }}.svc.cluster.local
  ports:
    - name: alertmanager
      port: 9093
      targetPort: 9093
---
apiVersion: v1
kind: Service
metadata:
  name: alertmanager-configurer
  labels:
    app.kubernetes.io/name: alertmanager-configurer
    app.kubernetes.io/part-of: magma-fullstack-upstream
spec:
  type: ExternalName
  externalName: {{ .Release.Name }}-alertmanager-configurer.{{ .Release.Namespace }}.svc.cluster.local
  ports:
    - name: alertmanager-configurer
      port: 9101
      targetPort: 9101
---
apiVersion: v1
kind: Service
metadata:
  name: orc8r-user-grafana
  labels:
    app.kubernetes.io/name: orc8r-user-grafana
    app.kubernetes.io/part-of: magma-fullstack-upstream
spec:
  type: ExternalName
  externalName: {{ .Release.Name }}-user-grafana.{{ .Release.Namespace }}.svc.cluster.local
  ports:
    - name: grafana
      port: 3000
      targetPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: fluentd
  labels:
    app.kubernetes.io/name: fluentd
    app.kubernetes.io/part-of: magma-fullstack-upstream
spec:
  type: ExternalName
  externalName: {{ .Release.Name }}-fluentd-forward.{{ .Release.Namespace }}.svc.cluster.local
  ports:
    - name: fluentd-forward
      port: 24224
      targetPort: 24224
---
apiVersion: v1
kind: Service
metadata:
  name: elasticsearch-logging
  labels:
    app.kubernetes.io/name: elasticsearch-logging
    app.kubernetes.io/part-of: magma-fullstack-upstream
spec:
  type: ExternalName
  externalName: {{ .Values.observability.elasticsearch.name }}.{{ .Release.Namespace }}.svc.cluster.local
  ports:
    - name: http
      port: 9200
      targetPort: 9200
{{- end }}
