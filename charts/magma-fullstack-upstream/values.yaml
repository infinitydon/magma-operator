global:
  domainName: magma.local

image:
  postgres: postgres:14.13-alpine
  elasticsearch: docker.elastic.co/elasticsearch/elasticsearch:7.17.23
  test: alpine:3.20.3
  pullPolicy: IfNotPresent

postgresql:
  enabled: true
  name: postgresql
  database: magma
  username: postgres
  password: postgres
  storage:
    size: 8Gi
    storageClassName: ""
  resources: {}

secrets:
  create: true
  reuseExisting: true
  certsName: orc8r-secrets-certs
  envdirName: orc8r-secrets-envdir
  configsName: orc8r-secrets-configs-orc8r
  caDays: 3650
  certDays: 3650

nmsAdmin:
  enabled: true
  organization: magma-test
  email: admin
  password: admin
  customDomains: []

provisioning:
  enabled: true
  network:
    id: mpk_test
    name: mpk_test
    description: Magma lab 5G network
    mcc: "001"
    mnc: "01"
    tac: 1
    enable5gFeatures: true
    cloudSubscriberdbEnabled: false
    defaultRuleId: default_rule_1
    subProfile: default
    maxDlBitRate: 1000000000
    maxUlBitRate: 1000000000
  apn:
    enabled: true
    name: magma.ipv4
    maxDlBitRate: 1000000000
    maxUlBitRate: 1000000000
    qosClassId: 9
    priorityLevel: 15
    preemptionCapability: true
    preemptionVulnerability: false
    pdnType: 0
  policy:
    enabled: true
    priority: 10
  subscriber:
    enabled: true
    imsi: IMSI001010000000001
    name: UERANSIM UE 001
    authKey: Rltc6LGZtJ+qXwou4jimvA==
    authOpc: 6O0oneupUuQoO1TojmGDyg==
    subProfile: default

orc8r:
  secrets:
    create: false
  certs:
    enabled: false
    create: false
  metrics:
    enabled: true
    prometheus:
      create: true
      nodeSelector:
        kubernetes.io/hostname: ebpf-bng-node-01
    prometheusCache:
      create: true
      nodeSelector:
        kubernetes.io/hostname: ebpf-bng-node-01
    alertmanager:
      create: true
      nodeSelector:
        kubernetes.io/hostname: ebpf-bng-node-01
    alertmanagerConfigurer:
      create: true
      nodeSelector:
        kubernetes.io/hostname: ebpf-bng-node-01
    prometheusConfigurer:
      create: true
      nodeSelector:
        kubernetes.io/hostname: ebpf-bng-node-01
    userGrafana:
      create: true
      nodeSelector:
        kubernetes.io/hostname: ebpf-bng-node-01
      volumes:
        datasources:
          volumeSpec:
            configMap:
              name: magma-grafana-datasources
        dashboardproviders:
          volumeSpec:
            configMap:
              name: magma-grafana-dashboardproviders
        dashboards:
          volumeSpec:
            configMap:
              name: magma-grafana-dashboards
    metrics:
      volumes:
        prometheusData:
          volumeSpec:
            hostPath:
              path: /var/lib/magma/prometheus-data
              type: DirectoryOrCreate
        prometheusConfig:
          volumeSpec:
            hostPath:
              path: /var/lib/magma/prometheus-config
              type: DirectoryOrCreate
  logging:
    enabled: true
    fluentd_forward:
      create: true
      dp_output: false
      image:
        repository: fluent/fluentd-kubernetes-daemonset
        tag: v1.16-debian-elasticsearch7-1
        pullPolicy: IfNotPresent
      env:
        elastic_host: elasticsearch-master
        elastic_port: "9200"
        elastic_scheme: http
        elastic_flush_interval: 5s
    fluentd_daemon:
      create: false
  nms:
    enabled: true
    controllerHostname: controller.magma.local
    magmalte:
      create: true
      image:
        repository: linuxfoundation.jfrog.io/magma-docker/magmalte
        tag: "1.9.0"
        pullPolicy: IfNotPresent
      env:
        api_host: magma-fullstack-nginx-proxy
        mysql_host: postgresql
        mysql_port: 5432
        mysql_db: magma
        mysql_user: postgres
        mysql_pass: postgres
        mysql_dialect: postgres
        session_cookie_secure: "false"
      service:
        type: NodePort
    nginx:
      create: false
      image:
        repository: linuxfoundation.jfrog.io/magma-docker/nginx
        tag: "1.9.0"
        pullPolicy: IfNotPresent
      service:
        type: ClusterIP
  secret:
    certs: orc8r-secrets-certs
    configs:
      orc8r: orc8r-secrets-configs-orc8r
    envdir: orc8r-secrets-envdir
  nginx:
    create: true
    service:
      enabled: true
      legacyEnabled: true
      type: NodePort
    spec:
      hostname: controller.magma.local
  controller:
    image:
      repository: linuxfoundation.jfrog.io/magma-docker/controller
      tag: "1.9.0"
      pullPolicy: IfNotPresent
      env:
        orc8r_domain_name: magma.local
    spec:
      database:
        driver: postgres
        sql_dialect: psql
        db: magma
        protocol: tcp
        host: postgresql
        port: 5432
        user: postgres
        pass: postgres
      service_registry:
        mode: k8s

observability:
  aliases:
    enabled: true
  elasticsearch:
    enabled: true
    name: elasticsearch-master
    replicas: 1
    storage:
      enabled: false
      size: 8Gi
      storageClassName: ""
    resources:
      requests:
        cpu: 100m
        memory: 512Mi
      limits:
        cpu: "1"
        memory: 1Gi

lte-orc8r:
  certs:
    enabled: false
  secret:
    certs: orc8r-secrets-certs
    configs:
      orc8r: orc8r-secrets-configs-orc8r
    envdir: orc8r-secrets-envdir
  controller:
    image:
      repository: linuxfoundation.jfrog.io/magma-docker/controller
      tag: "1.9.0"
      pullPolicy: IfNotPresent
      env:
        orc8r_domain_name: magma.local
    spec:
      database:
        driver: postgres
        sql_dialect: psql
        db: magma
        protocol: tcp
        host: postgresql
        port: 5432
        user: postgres
        pass: postgres
      service_registry:
        mode: k8s
