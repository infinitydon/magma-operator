        release_group: orc8rrel
        app.kubernetes.io/name: nms
        app.kubernetes.io/component: magmalte
        app.kubernetes.io/instance: orc8rrel

      annotations:
        release-name: orc8rrel
        chart-version: 0.1.12
    spec:
      terminationGracePeriodSeconds: 60
      containers:
        - name: nms-app
          image: "linuxfoundation.jfrog.io/magma-docker/magmalte:1.9.0"
          imagePullPolicy: IfNotPresent
          resources:
            {}
          command:
            - /bin/sh
            - -c
          args:
            - |
              if [ "${SESSION_COOKIE_SECURE}" = "false" ]; then
                sed -i "s/secure: !options.devMode,/secure: false,/" /usr/src/server/middleware/sessionMiddleware.ts
              fi
              exec yarn run start:prod
          env:
            - name: API_CERT_FILENAME
              value: /run/secrets/admin_operator.pem
            - name: API_PRIVATE_KEY_FILENAME
              value: /run/secrets/admin_operator.key.pem
            - name: API_HOST
              value: "magma-fullstack-nginx-proxy"
            - name: HOST
              value: "0.0.0.0"
            - name: PORT
              value: "8081"
            - name: MYSQL_DB
              value: "magma"
            - name: MYSQL_HOST
              value: "postgresql"
            - name: MYSQL_PORT
              value: "5432"
            - name: MYSQL_DIALECT
              value: "postgres"
            - name: MYSQL_PASS
              valueFrom:
                secretKeyRef:
                  name: magmalte-mysql-secrets
                  key: MYSQL_PASS
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: magmalte-mysql-secrets
                  key: MYSQL_USER
            - name: USER_GRAFANA_ADDRESS
              value: orc8r-user-grafana:3000
            - name: SESSION_COOKIE_SECURE
              value: "false"
          ports:
            - containerPort: 8081
          volumeMounts:
            - name: orc8r-secrets-certs
              mountPath: /run/secrets/admin_operator.pem
              subPath: admin_operator.pem
            - name: orc8r-secrets-certs
              mountPath: /run/secrets/admin_operator.key.pem
              subPath: admin_operator.key.pem
      volumes:
        - name: orc8r-secrets-certs
          secret:
            secretName: orc8r-secrets-certs
            defaultMode: 0444
