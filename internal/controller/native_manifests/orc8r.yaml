apiVersion: batch/v1
kind: Job
metadata:
  name: orc8rrel-nms-admin
  labels:
    app.kubernetes.io/component: nms-admin
    app.kubernetes.io/name: magma-fullstack-upstream
    app.kubernetes.io/instance: orc8rrel
    app.kubernetes.io/managed-by: Helm
    helm.sh/chart: magma-fullstack-upstream-0.1.0
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "10"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: 12
  template:
    metadata:
      labels:
        app.kubernetes.io/component: nms-admin
        app.kubernetes.io/instance: orc8rrel
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: register-admin-operator
          image: "linuxfoundation.jfrog.io/magma-docker/controller:1.9.0"
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -ceu
            - |
              attempts=0
              while [ "$attempts" -lt 60 ]; do
                attempts=$((attempts + 1))
                set +e
                output="$(envdir /var/opt/magma/envdir /var/opt/magma/bin/accessc add-existing -admin -cert /var/opt/magma/certs/admin_operator.pem admin_operator 2>&1)"
                rc="$?"
                set -e
                printf '%s\n' "$output"
                if [ "$rc" -eq 0 ]; then
                  exit 0
                fi
                case "$output" in
                  *AlreadyExists*) exit 0 ;;
                esac
                sleep 5
              done
              exit 1
          volumeMounts:
            - name: orc8r-secrets-certs
              mountPath: /var/opt/magma/certs
              readOnly: true
            - name: orc8r-secrets-envdir
              mountPath: /var/opt/magma/envdir
              readOnly: true
      containers:
        - name: nms-admin
          image: "linuxfoundation.jfrog.io/magma-docker/magmalte:1.9.0"
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -ceu
            - |
              until nc -z postgresql 5432; do sleep 5; done
              yarn setAdminPassword "orgplaceholder" "emailplaceholder" "passwordplaceholder"
          env:
            - name: MYSQL_DB
              value: "magma"
            - name: MYSQL_HOST
              value: "postgresql"
            - name: MYSQL_PORT
              value: "5432"
            - name: MYSQL_DIALECT
              value: postgres
            - name: MYSQL_USER
              value: "postgres"
            - name: MYSQL_PASS
              value: "postgres"
            - name: API_HOST
              value: "magma-fullstack-nginx-proxy"
            - name: API_CERT_FILENAME
              value: /run/secrets/admin_operator.pem
            - name: API_PRIVATE_KEY_FILENAME
              value: /run/secrets/admin_operator.key.pem
          volumeMounts:
            - name: orc8r-secrets-certs
              mountPath: /run/secrets/admin_operator.pem
              subPath: admin_operator.pem
              readOnly: true
            - name: orc8r-secrets-certs
              mountPath: /run/secrets/admin_operator.key.pem
              subPath: admin_operator.key.pem
              readOnly: true
      volumes:
        - name: orc8r-secrets-certs
          secret:
            secretName: orc8r-secrets-certs
            defaultMode: 0444
        - name: orc8r-secrets-envdir
          secret:
            secretName: orc8r-secrets-envdir
            defaultMode: 0444
