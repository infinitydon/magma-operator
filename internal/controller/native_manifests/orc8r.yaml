  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "1"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
  labels:
    app.kubernetes.io/name: metrics
    helm.sh/chart: metrics-1.4.24
    app.kubernetes.io/instance: orc8rrel
    app.kubernetes.io/version: "1.0"
    app.kubernetes.io/managed-by: Helm
spec:
  template:
    metadata:
      name: orc8rrel-metrics-storeconfig
      labels:
        app.kubernetes.io/name: metrics
        helm.sh/chart: metrics-1.4.24
        app.kubernetes.io/instance: orc8rrel
        app.kubernetes.io/version: "1.0"
        app.kubernetes.io/managed-by: Helm
    spec:
      restartPolicy: OnFailure
      nodeSelector:
        kubernetes.io/hostname: ebpf-bng-node-01
      containers:
        - name: storeconfig
          image: alpine:3.20.3
          command:
            - /bin/sh
            - -c
            - |
              apk update && apk add --no-cache coreutils
              cp -n /mnt/defaults/alertmanager.yml /mnt/configs/
              mkdir -p /mnt/configs/alert_rules && chmod +x /mnt/configs/alert_rules
              cp -n /mnt/defaults/*rules.yml /mnt/configs/alert_rules/
          volumeMounts:
            - name: defaults
              mountPath: /mnt/defaults
            - name: configs
              mountPath: /mnt/configs
      volumes:
        - name: defaults
          configMap:
            name: orc8rrel-metrics-defaultconfig
        - name: configs
          hostPath:
            path: /var/lib/magma/prometheus-config
            type: DirectoryOrCreate
