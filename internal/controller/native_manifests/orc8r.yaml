# Source: magma-fullstack-upstream/charts/orc8r/charts/logging/templates/fluentd-forward.configmap.yaml
kind: ConfigMap
apiVersion: v1
metadata:
  name: orc8rrel-fluentd-forward-configs
  namespace: orc8rns
  labels:
    addonmanager.kubernetes.io/mode: Reconcile
data:
  forward.conf: |-
    <source>
      @type forward
      port 24224
      bind 0.0.0.0

      <transport tls>
        cert_path /var/opt/magma/certs/fluentd.pem
        private_key_path /var/opt/magma/certs/fluentd.key

        client_cert_auth true
        ca_path /var/opt/magma/certs/certifier.pem
      </transport>
    </source>

  output.conf: |-
    <match **>
      @type elasticsearch
      @id out_es
      @log_level info
      include_tag_key true
      host "#{ENV['FLUENT_ELASTICSEARCH_HOST']}"
      port "#{ENV['FLUENT_ELASTICSEARCH_PORT']}"
      scheme "#{ENV['FLUENT_ELASTICSEARCH_SCHEME'] || 'https'}"
      ssl_verify "#{ENV['FLUENT_ELASTICSEARCH_SSL_VERIFY'] || 'false'}"
      ssl_version "#{ENV['FLUENT_ELASTICSEARCH_SSL_VERSION'] || 'TLSv1'}"
      reload_connections "#{ENV['FLUENT_ELASTICSEARCH_RELOAD_CONNECTIONS'] || 'false'}"
      reconnect_on_error "#{ENV['FLUENT_ELASTICSEARCH_RECONNECT_ON_ERROR'] || 'true'}"
      reload_on_failure "#{ENV['FLUENT_ELASTICSEARCH_RELOAD_ON_FAILURE'] || 'true'}"
      log_es_400_reason "#{ENV['FLUENT_ELASTICSEARCH_LOG_ES_400_REASON'] || 'false'}"
      logstash_prefix "#{ENV['FLUENT_ELASTICSEARCH_LOGSTASH_PREFIX'] || 'fluentd'}"
      logstash_format "#{ENV['FLUENT_ELASTICSEARCH_LOGSTASH_FORMAT'] || 'true'}"
      index_name "#{ENV['FLUENT_ELASTICSEARCH_LOGSTASH_INDEX_NAME'] || 'fluentd'}"
      type_name "#{ENV['FLUENT_ELASTICSEARCH_LOGSTASH_TYPE_NAME'] || 'fluentd'}"
      <buffer>
        flush_thread_count "#{ENV['FLUENT_ELASTICSEARCH_BUFFER_FLUSH_THREAD_COUNT'] || '8'}"
        flush_interval "#{ENV['FLUENT_ELASTICSEARCH_BUFFER_FLUSH_INTERVAL'] || '5s'}"
        chunk_limit_size "#{ENV['FLUENT_ELASTICSEARCH_BUFFER_CHUNK_LIMIT_SIZE'] || '2M'}"
        queue_limit_length "#{ENV['FLUENT_ELASTICSEARCH_BUFFER_QUEUE_LIMIT_LENGTH'] || '32'}"
        retry_max_interval "#{ENV['FLUENT_ELASTICSEARCH_BUFFER_RETRY_MAX_INTERVAL'] || '30'}"
        retry_forever true
      </buffer>
    </match>



  fluent.conf: |-
    @include /fluentd/etc/forward.conf
    @include /fluentd/etc/output.conf
---
# Source: magma-fullstack-upstream/charts/orc8r/charts/metrics/templates/prometheus.deployment.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config-file
data:
  prometheus.yml: |
    global:
      scrape_interval:     15s # By default, scrape targets every 15 seconds.
      evaluation_interval: 15s # By default, scrape targets every 15 seconds.
      external_labels:
        monitor: 'master'

    scrape_configs:
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']

      - job_name: "magma_pushgateway"
        honor_labels: true
        honor_timestamps: false
        metric_relabel_configs:
          - regex: 'job'
            action: labeldrop
          - regex: 'instance'
            action: labeldrop
        static_configs:
          - targets: ['orc8r-prometheus-cache:9091']
      - job_name: "magma_pushgateway_stats"
        metrics_path: '/internal'
        static_configs:
          - targets: ['orc8r-prometheus-cache:9091']

    rule_files:
      - '/etc/prometheus/alert_rules/*_rules.yml'


    alerting:
      alertmanagers:
        - scheme: http
          static_configs:
            - targets: ['orc8r-alertmanager:9093']
---
# Source: magma-fullstack-upstream/charts/orc8r/charts/metrics/templates/user-grafana.deployment.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-config-file
data:
  grafana.ini: |
    [users]
    allow_sign_up = false
    auto_assign_org = false

    [auth.proxy]
    enabled = true
    header_name = X-WEBAUTH-USER
    header_property = username
    auto_sign_up = false

    [server]
    root_url = /grafana

    [security]
    allow_embedding = true
---
