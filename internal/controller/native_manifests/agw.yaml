# Source: magma-agw-upstream/templates/agw-node-prep.daemonset.yaml
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: agw-node-prep
  namespace: agwns
  labels:
    app.kubernetes.io/component: agw-node-prep
    app.kubernetes.io/name: magma-agw-upstream
    app.kubernetes.io/component: magma-agw-upstream
    app.kubernetes.io/instance: agwrel
    app.kubernetes.io/managed-by: helm
    helm.sh/chart: magma-agw-upstream-0.1.0
    app.kubernetes.io/version: "1.9.0-upstream"
spec:
  selector:
    matchLabels:
      app.kubernetes.io/component: agw-node-prep
      app.kubernetes.io/name: magma-agw-upstream
      app.kubernetes.io/instance: agwrel
  template:
    metadata:
      labels:
        app.kubernetes.io/component: agw-node-prep
        app.kubernetes.io/name: magma-agw-upstream
        app.kubernetes.io/instance: agwrel
    spec:
      hostNetwork: true
      hostPID: true
      restartPolicy: Always
      nodeSelector:
        magma:
          io/agw-node: "true"
      containers:
        - name: agw-node-prep
          image: "ubuntu:22.04"
          imagePullPolicy: IfNotPresent
          securityContext:
            privileged: true
          command:
            - /bin/bash
            - -ceu
            - |
              log() { printf '[agw-node-prep] %s\n' "$*"; }
              host() { nsenter -t 1 -m -u -i -n -p -- "$@"; }
              host_sh() { nsenter -t 1 -m -u -i -n -p -- /bin/bash -ceu "$1"; }

              ensure_host_cmd() {
                local cmd="$1"
                if host_sh "command -v ${cmd} >/dev/null 2>&1"; then
                  log "${cmd} already present on host"
                  return
                fi
                log "${cmd} missing; installing AGW host prerequisites"
                host_sh 'if ! command -v apt-get >/dev/null 2>&1; then echo "apt-get not found on host" >&2; exit 1; fi'
                host_sh 'export DEBIAN_FRONTEND=noninteractive; apt-get update; apt-get install -y openvswitch-switch iproute2 iptables kmod'
              }

              ensure_module() {
                local module="$1"
                if host_sh "lsmod | awk '{print \$1}' | grep -qx ${module}"; then
                  log "kernel module ${module} already loaded"
                else
                  log "loading kernel module ${module} if available"
                  if host modprobe "${module}"; then
                    return
                  fi
                  log "kernel module ${module} unavailable; installing linux-modules-extra for running kernel"
                  host_sh 'if ! command -v apt-get >/dev/null 2>&1; then echo "apt-get not found on host" >&2; exit 1; fi'
                  host_sh 'export DEBIAN_FRONTEND=noninteractive; apt-get update; apt-get install -y "linux-modules-extra-$(uname -r)"'
                  host modprobe "${module}"
                fi
              }

              ensure_sysctl() {
                local key="$1"
                local value="$2"
                local current
                current="$(host sysctl -n "${key}" 2>/dev/null || true)"
                if [ "${current}" = "${value}" ]; then
                  log "sysctl ${key}=${value} already set"
                else
                  log "setting sysctl ${key}=${value}"
                  host sysctl -w "${key}=${value}"
                fi
              }

              ensure_nat_egress() {
                local source_cidr="$1"
                local egress_iface="$2"
                [ -n "${source_cidr}" ] || return 0
                if [ -z "${egress_iface}" ]; then
                  egress_iface="$(host_sh "ip route show default 0.0.0.0/0 | awk '{print \$5; exit}'")"
                fi
                if [ -z "${egress_iface}" ]; then
                  log "could not determine NAT egress interface"
                  return 1
                fi
                if ! host ip link show "${egress_iface}" >/dev/null 2>&1; then
                  log "NAT egress interface ${egress_iface} is missing"
                  return 1
                fi
                log "ensuring NAT egress for ${source_cidr} via ${egress_iface}"
                host_sh "iptables -t nat -C POSTROUTING -s '${source_cidr}' -o '${egress_iface}' -j MASQUERADE 2>/dev/null || iptables -t nat -I POSTROUTING 1 -s '${source_cidr}' -o '${egress_iface}' -j MASQUERADE"
                host_sh "iptables -C FORWARD -s '${source_cidr}' -o '${egress_iface}' -j ACCEPT 2>/dev/null || iptables -I FORWARD 1 -s '${source_cidr}' -o '${egress_iface}' -j ACCEPT"
                host_sh "iptables -C FORWARD -d '${source_cidr}' -i '${egress_iface}' -m conntrack --ctstate RELATED,ESTABLISHED -j ACCEPT 2>/dev/null || iptables -I FORWARD 1 -d '${source_cidr}' -i '${egress_iface}' -m conntrack --ctstate RELATED,ESTABLISHED -j ACCEPT"
              }

              ensure_tcp_mss_clamp() {
                local bridge="$1"
                local mss="$2"
                [ -n "${bridge}" ] || return 0
                [ -n "${mss}" ] || return 0
                log "ensuring TCP MSS clamp on ${bridge} with MSS ${mss}"
                host_sh "iptables -t mangle -C FORWARD -i '${bridge}' -p tcp --tcp-flags SYN,RST SYN -j TCPMSS --set-mss '${mss}' 2>/dev/null || iptables -t mangle -A FORWARD -i '${bridge}' -p tcp --tcp-flags SYN,RST SYN -j TCPMSS --set-mss '${mss}'"
                host_sh "iptables -t mangle -C FORWARD -o '${bridge}' -p tcp --tcp-flags SYN,RST SYN -j TCPMSS --set-mss '${mss}' 2>/dev/null || iptables -t mangle -A FORWARD -o '${bridge}' -p tcp --tcp-flags SYN,RST SYN -j TCPMSS --set-mss '${mss}'"
              }

              disable_iface_offloads() {
                local iface="$1"
                [ -n "${iface}" ] || return 0
                if ! host ip link show "${iface}" >/dev/null 2>&1; then
                  log "interface ${iface} is not present; skipping offload disable"
                  return 0
                fi
                if ! host_sh 'command -v ethtool >/dev/null 2>&1'; then
                  log "ethtool missing; installing for offload management"
                  host_sh 'export DEBIAN_FRONTEND=noninteractive; apt-get update; apt-get install -y ethtool'
                fi
                log "disabling GSO/GRO/TSO/checksum offloads on ${iface}"
                host ethtool -K "${iface}" gso off gro off tso off tx off >/dev/null 2>&1 || true
              }

              ensure_ovs_started() {
                if host_sh 'ovs-vsctl show >/dev/null 2>&1'; then
                  log "Open vSwitch database already reachable"
                  return
                fi
                log "starting Open vSwitch with stale runtime cleanup"
                host_sh 'mkdir -p /var/run/openvswitch; /usr/share/openvswitch/scripts/ovs-ctl stop || true; pkill ovs-vswitchd || true; pkill ovsdb-server || true; rm -f /var/run/openvswitch/*.pid /var/run/openvswitch/*.ctl /var/run/openvswitch/*.sock /var/run/openvswitch/*.mgmt /var/run/openvswitch/*.snoop; /usr/share/openvswitch/scripts/ovs-ctl start --system-id=random'
                host_sh 'for i in {1..15}; do ovs-vsctl show >/dev/null 2>&1 && exit 0; sleep 1; done; ovs-vsctl show >/dev/null'
              }

              ovs_gtpu_supported() {
                local bridge="$1"
                local probe_port="$2"
                local type="$3"
                local existing_gtpu
                local ofport
                local error
                existing_gtpu="$(host ovs-vsctl --data=bare --no-heading --columns=name find Interface type="${type}" 2>/dev/null | head -n1 || true)"
                if [ -n "${existing_gtpu}" ]; then
                  ofport="$(host ovs-vsctl --if-exists get Interface "${existing_gtpu}" ofport 2>/dev/null || true)"
                  error="$(host ovs-vsctl --if-exists get Interface "${existing_gtpu}" error 2>/dev/null || true)"
                  if [ -n "${ofport}" ] && [ "${ofport}" != "-1" ] && { [ -z "${error}" ] || [ "${error}" = '""' ] || [ "${error}" = "[]" ]; }; then
                    log "OVS GTP-U interface ${existing_gtpu} is already healthy with ofport ${ofport}"
                    return 0
                  fi
                fi
                host ovs-vsctl --if-exists del-port "${bridge}" "${probe_port}" || true
                if ! host ovs-vsctl --may-exist add-port "${bridge}" "${probe_port}" -- \
                  set Interface "${probe_port}" type="${type}" options:remote_ip=flow options:key=flow ofport_request=32000; then
                  log "OVS GTP-U probe failed while adding ${probe_port}"
                  host ovs-vsctl --if-exists del-port "${bridge}" "${probe_port}" || true
                  return 1
                fi
                ofport="$(host ovs-vsctl --if-exists get Interface "${probe_port}" ofport 2>/dev/null || true)"
                error="$(host ovs-vsctl --if-exists get Interface "${probe_port}" error 2>/dev/null || true)"
                host ovs-vsctl --if-exists del-port "${bridge}" "${probe_port}" || true
                if [ -n "${error}" ] && [ "${error}" != '""' ] && [ "${error}" != "[]" ]; then
                  log "OVS GTP-U probe reported error: ${error}"
                  return 1
                fi
                if [ -z "${ofport}" ] || [ "${ofport}" = "-1" ]; then
                  log "OVS GTP-U probe did not receive a usable ofport"
                  return 1
                fi
                log "OVS GTP-U probe succeeded with ofport ${ofport}"
              }

              install_ovs_kmod_package() {
                local package_url="$1"
                local package_sha256="$2"
                local package_path="$3"
                [ -n "${package_url}" ] || return 1
                log "installing Magma OVS kmod package from ${package_url}"
                if host_sh 'command -v curl >/dev/null 2>&1'; then
                  host curl -fsSL "${package_url}" -o "${package_path}"
                elif host_sh 'command -v wget >/dev/null 2>&1'; then
                  host wget -qO "${package_path}" "${package_url}"
                else
                  log "neither curl nor wget is available on host"
                  return 1
                fi
                if [ -n "${package_sha256}" ]; then
                  host_sh "echo '${package_sha256}  ${package_path}' | sha256sum -c -"
                fi
                host_sh "export DEBIAN_FRONTEND=noninteractive; dpkg -i '${package_path}' || apt-get install -f -y"
              }

              ensure_magma_ovs_kmod() {
                local bridge="$1"
                local probe_port="$2"
                local type="$3"
                local script="$4"
                local run_upgrade="$5"
                local required="$6"
                local install_command="$7"
                local package_url="$8"
                local package_sha256="$9"
                local package_path="${10}"
                if [ "true" = "true" ] && ovs_gtpu_supported "${bridge}" "${probe_port}" "${type}"; then
                  log "Magma-compatible OVS GTP-U datapath is already available"
                  return
                fi
                if [ "${run_upgrade}" != "true" ]; then
                  log "Magma OVS kmod upgrade disabled"
                  if [ "${required}" = "true" ]; then
                    log "Magma OVS kmod is required but upgrade is disabled"
                    return 1
                  fi
                  return
                fi
                if [ -n "${install_command}" ]; then
                  log "running Magma OVS kmod install command"
                  host_sh "${install_command}"
                elif [ -n "${package_url}" ]; then
                  install_ovs_kmod_package "${package_url}" "${package_sha256}" "${package_path}"
                elif host test -x "${script}"; then
                  log "running Magma OVS kmod upgrade script ${script}"
                  host "${script}"
                else
                  if [ "${required}" = "true" ]; then
                    log "Magma OVS GTP-U datapath is required, but no install command, package URL, or executable ${script} was found"
                    return 1
                  fi
                  log "Magma OVS kmod installer not configured; continuing"
                  return
                fi
                ensure_ovs_started
                if [ "true" = "true" ] && ! ovs_gtpu_supported "${bridge}" "${probe_port}" "${type}"; then
                  log "Magma OVS kmod installer completed, but OVS GTP-U datapath is still unavailable"
                  return 1
                fi
              }

              ensure_bridge() {
                local bridge="$1"
                if host ovs-vsctl br-exists "${bridge}"; then
                  log "OVS bridge ${bridge} already exists"
                else
                  log "creating OVS bridge ${bridge}"
                  host ovs-vsctl add-br "${bridge}"
                fi
                host ip link set "${bridge}" up
                host ovs-vsctl set bridge "${bridge}" protocols="OpenFlow10,OpenFlow13,OpenFlow14" other-config:disable-in-band=true
                host ovs-vsctl set bridge "${bridge}" datapath_type="system"
                host ip link set "${bridge}" up || true
              }

              ensure_addr() {
                local iface="$1"
                local cidr="$2"
                local replace="${3:-false}"
                [ -n "${cidr}" ] || return 0
                if [ "${replace}" = "true" ]; then
                  while read -r existing; do
                    [ -n "${existing}" ] || continue
                    if [ "${existing}" != "${cidr}" ]; then
                      log "removing stale address ${existing} from ${iface}"
                      host ip addr del "${existing}" dev "${iface}" || true
                    fi
                  done < <(host_sh "ip -4 -o addr show dev ${iface}" | awk '{print $4}')
                fi
                if host ip addr show dev "${iface}" | grep -qw "${cidr}"; then
                  log "${iface} already has ${cidr}"
                else
                  log "adding ${cidr} to ${iface}"
                  host ip addr add "${cidr}" dev "${iface}" || true
                fi
              }

              ensure_dummy_iface() {
                local iface="$1"
                if host ip link show "${iface}" >/dev/null 2>&1; then
                  log "interface ${iface} already exists"
                else
                  log "creating dummy interface ${iface}"
                  host ip link add name "${iface}" type dummy
                fi
                host ip link set "${iface}" up
              }

              ensure_macvlan_iface() {
                local iface="$1"
                local parent="$2"
                local mode="$3"
                if host ip link show "${iface}" >/dev/null 2>&1; then
                  log "interface ${iface} already exists"
                else
                  if ! host ip link show "${parent}" >/dev/null 2>&1; then
                    log "parent interface ${parent} missing for ${iface}"
                    return 1
                  fi
                  log "ensuring parent interface ${parent} is up for ${iface}"
                  host ip link set "${parent}" up
                  log "creating macvlan interface ${iface} on ${parent}"
                  host ip link add name "${iface}" link "${parent}" type macvlan mode "${mode}"
                fi
                host ip link set "${iface}" up
              }

              ensure_data_iface() {
                local iface="$1"
                local type="$2"
                local parent="$3"
                local mode="$4"
                case "${type}" in
                  macvlan) ensure_macvlan_iface "${iface}" "${parent}" "${mode:-bridge}" ;;
                  physical|host-device)
                    if host ip link show "${iface}" >/dev/null 2>&1; then
                      log "using existing host interface ${iface}"
                      host ip link set "${iface}" up
                    else
                      log "host interface ${iface} missing"
                      return 1
                    fi
                    ;;
                  dummy|"") ensure_dummy_iface "${iface}" ;;
                  *)
                    log "unsupported nodePrep interface type ${type} for ${iface}"
                    return 1
                    ;;
                esac
              }

              cleanup_legacy_iface() {
                local iface="$1"
                if ! host ip link show "${iface}" >/dev/null 2>&1; then
                  log "legacy interface ${iface} is already absent"
                  return
                fi
                log "removing legacy interface ${iface}"
                host ip link del "${iface}" || true
              }

              ensure_ovs_internal_port() {
                local bridge="$1"
                local iface="$2"
                local ofport="${3:-}"
                if host ovs-vsctl --data=bare --no-heading --columns=name find Interface name="${iface}" | grep -qx "${iface}"; then
                  log "OVS internal port ${iface} already exists on ${bridge}"
                else
                  if host ip link show "${iface}" >/dev/null 2>&1; then
                    log "removing non-OVS interface ${iface} before creating internal port"
                    host ip link del "${iface}" || true
                  fi
                  log "creating OVS internal port ${iface} on ${bridge}"
                  host ovs-vsctl --may-exist add-port "${bridge}" "${iface}" -- set Interface "${iface}" type=internal
                fi
                if [ -n "${ofport}" ]; then
                  local current_ofport
                  current_ofport="$(host ovs-vsctl --if-exists get Interface "${iface}" ofport 2>/dev/null || true)"
                  if [ "${current_ofport}" != "${ofport}" ]; then
                    log "setting requested ofport ${ofport} for ${iface}"
                    host ovs-vsctl set Interface "${iface}" ofport_request="${ofport}"
                  fi
                fi
                if host ip link show "${iface}" >/dev/null 2>&1; then
                  host ip link set "${iface}" up || log "could not set OVS internal port ${iface} up; continuing"
                else
                  log "OVS internal port ${iface} has no host netdev yet; continuing"
                fi
              }

              ensure_ovs_patch_port() {
                local bridge="$1"
                local iface="$2"
                local peer="$3"
                local ofport="${4:-}"
                log "ensuring OVS patch port ${iface} on ${bridge} peers with ${peer}"
                host ovs-vsctl --may-exist add-port "${bridge}" "${iface}" -- set Interface "${iface}" type=patch options:peer="${peer}"
                if [ -n "${ofport}" ]; then
                  local current_ofport
                  current_ofport="$(host ovs-vsctl --if-exists get Interface "${iface}" ofport 2>/dev/null || true)"
                  if [ "${current_ofport}" != "${ofport}" ]; then
                    log "setting requested ofport ${ofport} for patch port ${iface}"
                    host ovs-vsctl set Interface "${iface}" ofport_request="${ofport}"
                  fi
                fi
              }

              ensure_ovs_system_port() {
                local bridge="$1"
                local iface="$2"
                if ! host ip link show "${iface}" >/dev/null 2>&1; then
                  log "host interface ${iface} missing for OVS bridge ${bridge}"
                  return 1
                fi
                log "ensuring host interface ${iface} is attached to OVS bridge ${bridge}"
                host ovs-vsctl --may-exist add-port "${bridge}" "${iface}"
                host ip link set "${iface}" up
              }

              ensure_ovs_gtpu_port() {
                local bridge="$1"
                local iface="$2"
                local ofport="$3"
                local type="$4"
                if host ovs-vsctl --data=bare --no-heading --columns=name find Interface name="${iface}" | grep -qx "${iface}"; then
                  local current_ofport
                  current_ofport="$(host ovs-vsctl --if-exists get Interface "${iface}" ofport 2>/dev/null || true)"
                  if [ "${current_ofport}" = "${ofport}" ]; then
                    log "OVS GTP-U port ${iface} already present on ${bridge} with ofport ${ofport}"
                    return
                  fi
                  log "recreating OVS GTP-U port ${iface}; current ofport is ${current_ofport:-unset}, expected ${ofport}"
                  host ovs-vsctl --if-exists del-port "${bridge}" "${iface}"
                else
                  log "creating OVS GTP-U port ${iface} on ${bridge}"
                fi
                host ovs-vsctl --may-exist add-port "${bridge}" "${iface}" -- \
                  set Interface "${iface}" type="${type}" options:remote_ip=flow options:key=flow ofport_request="${ofport}"
                local created_ofport
                created_ofport="$(host ovs-vsctl --if-exists get Interface "${iface}" ofport 2>/dev/null || true)"
                if [ "${created_ofport}" != "${ofport}" ]; then
                  log "OVS GTP-U port ${iface} is not ready; ofport=${created_ofport:-unset}, expected ${ofport}"
                  host ovs-vsctl --if-exists list Interface "${iface}" || true
                  return 1
                fi
              }

              cleanup_ovs_port() {
                local bridge="$1"
                local iface="$2"
                if host ovs-vsctl --if-exists get Interface "${iface}" name >/dev/null 2>&1; then
                  log "removing stale OVS port ${iface} from ${bridge}"
                  host ovs-vsctl --if-exists del-port "${bridge}" "${iface}"
                else
                  log "stale OVS port ${iface} is already absent"
                fi
              }

              ensure_host_cmd ovs-vsctl
              ensure_module openvswitch
              ensure_module nf_conntrack
              ensure_module gtp
              ensure_sysctl "net.ipv4.ip_forward" "1"
              ensure_nat_egress "192.168.128.0/24" ""
              ensure_ovs_started
              ensure_bridge "gtp_br0"
              ensure_magma_ovs_kmod "gtp_br0" "magma-gtpu-probe" "gtpu" "/usr/local/bin/ovs-kmod-upgrade.sh" "true" "false" "" "" "" "/tmp/magma-ovs-kmod.deb"
              ensure_ovs_started
              ensure_bridge "gtp_br0"
              ensure_addr "gtp_br0" "192.168.128.1/24" "false"
              ensure_ovs_gtpu_port "gtp_br0" "gtpu0" "32768" "gtpu"
              disable_iface_offloads "gtp_br0"
              disable_iface_offloads "gtpu_sys_2152"
              cleanup_legacy_iface "eth1"
              cleanup_legacy_iface "eth2"
              ensure_tcp_mss_clamp "gtp_br0" "1400"

              ensure_data_iface "magma-n2" "macvlan" "s1placeholder" "bridge"
              ensure_addr "magma-n2" "10.88.99.142/24" "true"
              ensure_data_iface "magma-n3" "macvlan" "enp8s20" "bridge"
              ensure_addr "magma-n3" "192.168.60.142/24" "true"
              ensure_data_iface "magma-sgi" "macvlan" "sgiplaceholder" "bridge"
              ensure_addr "magma-sgi" "" "true"
              ensure_bridge "uplink_br0"
              ensure_ovs_patch_port "gtp_br0" "patch-up" "patch-agw" "2"
              ensure_ovs_patch_port "uplink_br0" "patch-agw" "patch-up" ""
              ensure_ovs_system_port "uplink_br0" "magma-sgi"
              ensure_ovs_internal_port "gtp_br0" "mtr0" "15577"
              ensure_addr "mtr0" "192.168.128.2/32" "false"
              ensure_ovs_internal_port "gtp_br0" "ipfix0" ""
              ensure_addr "ipfix0" "" "false"
              ensure_ovs_internal_port "gtp_br0" "li_port" ""
              ensure_addr "li_port" "" "false"

              log "node preparation complete"
              sleep infinity
---
