# Source: magma-agw-upstream/templates/magmad-systemctl-shim.config.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: magmad-systemctl-shim
  namespace: agwns
  labels:
    app.kubernetes.io/name: magma-agw-upstream
    app.kubernetes.io/component: magma-agw-upstream
    app.kubernetes.io/instance: agwrel
    app.kubernetes.io/managed-by: helm
    helm.sh/chart: magma-agw-upstream-0.1.0
data:
  systemctl: |
    #!/bin/sh
    set -eu

    command="${1:-}"

    case "$command" in
      is-active)
        echo active
        exit 0
        ;;
      show)
        echo MainPID=0
        echo MemoryCurrent=0
        echo MemoryAccounting=no
        echo MemoryLimit=infinity
        exit 0
        ;;
      start|stop|reload-or-restart|restart)
        exit 0
        ;;
      *)
        echo "unsupported systemctl shim command: $*" >&2
        exit 1
        ;;
    esac
---
