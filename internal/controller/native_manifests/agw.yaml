# Source: magma-agw-upstream/templates/agwc-config.pod.yaml
apiVersion: batch/v1
kind: Job
metadata:
  labels:
    app.kubernetes.io/component: agwc-config
  name: agwrel-config-1
  namespace: agwns
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app.kubernetes.io/component: agwc-config
    spec:
      restartPolicy: Never
      hostNetwork: true
      nodeSelector:
        kubernetes.io/hostname: ebpf-bng-node-03-ubuntu-focal
        magma:
          io/agw-node: "true"
        magma.io/agw-node: "true"
      containers:
        - args:
          - sh
          - -c
          - mkdir -p /var/opt/magma/configs &&
            cp -f /gateway-config-source/*.yml /var/opt/magma/configs/ &&
            cp -f /gateway-config-source/gateway.mconfig /var/opt/magma/configs/gateway.mconfig &&
            cp -f /configs/control_proxy.yml /var/opt/magma/configs/  &&
            mkdir -p /var/opt/magma/certs && cp -f /certs/* /var/opt/magma/certs/ &&
            if [ -s /configs/gw_challenge.b64 ]; then
              base64 -d /configs/gw_challenge.b64 > /var/opt/magma/certs/gw_challenge.key &&
              chmod 0600 /var/opt/magma/certs/gw_challenge.key;
            fi &&
            /usr/local/bin/generate_nghttpx_config.py &&
            /usr/local/bin/generate_oai_config.py &&
            sed -i -E 's/^([[:space:]]*)T3512[[:space:]]*=.*/\1T3512 = 54/' /var/opt/magma/tmp/mme.conf &&
            grep -n 'T3512' /var/opt/magma/tmp/mme.conf
          image: "ghcr.io/infinitydon/telco-helm-charts/agw_gateway_python:1.9.0-upstream"
          imagePullPolicy: IfNotPresent
          name: agwc-config
          resources: {}
          volumeMounts:
            - name: magma-config
              mountPath: /etc/magma/magmad.yml
              subPath: magmad.yml
              readOnly: true
            - name: magma-config
              mountPath: /etc/magma/service_registry.yml
              subPath: service_registry.yml
              readOnly: true
            - name: magma-config
              mountPath: /etc/magma/gateway.mconfig
              subPath: gateway.mconfig
              readOnly: true
            - mountPath: /var/opt/magma
              name: agwc-claim
            - mountPath: /certs
              name: agwc-secret
            - mountPath: /configs
              name: controlproxy-config
            - mountPath: /gateway-config-source
              name: gateway-config
              readOnly: true
      volumes:
        - name: magma-config
          configMap:
            name: gateway-config
        - name: agwc-claim
          persistentVolumeClaim:
            claimName: agwc-claim
        - name: agwc-secret
          secret:
            secretName: agwc-secret-certs
        - name: controlproxy-config
          configMap:
            name: controlproxy-config
        - name: gateway-config
          configMap:
            name: gateway-config
