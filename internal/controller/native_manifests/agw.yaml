data:
  init-gnb.sh: |
    #!/bin/sh
    set -eu
    n2_if="n2"
    n3_if="n3"
    n2_ip="$(ip -4 addr show "${n2_if}" | awk '/inet / {print $2}' | cut -d/ -f1 | head -1)"
    n3_ip="$(ip -4 addr show "${n3_if}" | awk '/inet / {print $2}' | cut -d/ -f1 | head -1)"
    if [ -z "${n2_ip}" ] || [ -z "${n3_ip}" ]; then
      echo "Could not determine UERANSIM N2/N3 IPs" >&2
      ip addr
      exit 1
    fi
    cat >/config/gnb.yaml <<EOF
    mcc: '001'
    mnc: '01'
    nci: '0x000000010'
    idLength: 32
    tac: 000001
    linkIp: '0.0.0.0'
    ngapIp: '${n2_ip}'
    gtpIp: '${n3_ip}'
    amfConfigs:
      - address: '10.88.99.142'
        port: 38412
    slices:
      - sst: 1
    ignoreStreamIds: true
    EOF
  ue.yaml: |
    supi: 'imsi-001010000000001'
    mcc: '001'
    mnc: '01'
    key: '465B5CE8B199B49FAA5F0A2EE238A6BC'
    op: 'E8ED289DEBA952E4283B54E88E6183CA'
    opType: 'OPC'
    amf: '8000'
    imei: '356938035643803'
    imeiSv: '4370816125816151'
    gnbSearchList:
      - agwrel-ueransim-gnb
    uacAic:
      mps: false
      mcs: false
    uacAcc:
      normalClass: 0
      class11: false
      class12: false
      class13: false
      class14: false
      class15: false
    sessions:
      - type: 'IPv4'
        apn: 'magma.ipv4'
        slice:
          sst: 1
    configured-nssai:
      - sst: 1
    default-nssai:
      - sst: 1
    integrity:
      IA1: true
      IA2: true
      IA3: true
    ciphering:
      EA1: true
      EA2: true
      EA3: true
    integrityMaxRate:
      uplink: 'full'
      downlink: 'full'
